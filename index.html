<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Ping Pong Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Animated colorful background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            font-size: 2.2rem;
        }

        .controls {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 25px;
        }

        .score-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 55px;
            padding: 5px;
            border-radius: 12px;
            border: none;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            outline: none;
        }

        button {
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        button.active {
            background-color: #ffe600;
            color: #000;
        }

        .canvas-container {
            position: relative;
        }

        canvas {
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: rgba(0, 0, 0, 0.4);
            display: block;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .game-over-overlay h2 {
            font-size: 2.5rem;
            color: #ffe600;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
        }

        .game-over-overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 12px;
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🏓 Colorful Ping Pong</h1>

    <div class="controls">
        <div class="button-group">
            <button id="vsRobotBtn" class="active" onclick="setMode('robot')">VS Robot</button>
            <button id="vs2PlayerBtn" onclick="setMode('2player')">2 Players</button>
        </div>

        <div class="button-group">
            <button id="easyBtn" class="active" onclick="setDifficulty('easy')">Easy</button>
            <button id="mediumBtn" onclick="setDifficulty('medium')">Medium</button>
            <button id="hardBtn" onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div class="score-input-container">
            <label for="maxScoreInput">Points to Win:</label>
            <input type="number" id="maxScoreInput" value="5" min="1" max="99" onchange="updateMaxScore(this.value)">
        </div>

        <div class="button-group">
            <button id="musicBtn" class="active" onclick="toggleAudio()">🔊 Sound: ON</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="pong" width="800" height="500"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <h2 id="winnerText">Player 1 Wins!</h2>
            <p>Game Over</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="instructions" id="instructionsText">
        Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Robot AI</b>
    </div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        let gameMode = 'robot'; 
        let difficulty = 'easy'; 
        let targetScore = 5;
        let isGameOver = false;

        // Sound System (Web Audio API)
        let audioCtx = null;
        let isAudioMuted = false;
        let musicInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startBackgroundMusic();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function toggleAudio() {
            isAudioMuted = !isAudioMuted;
            const btn = document.getElementById("musicBtn");
            btn.innerText = isAudioMuted ? "🔇 Sound: OFF" : "🔊 Sound: ON";
            btn.classList.toggle("active", !isAudioMuted);
        }

        // Sound Effects
        function playTone(freq, type = 'sine', duration = 0.1, vol = 0.1) {
            if (isAudioMuted || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playPaddleHitSound() {
            playTone(440, 'triangle', 0.1, 0.2); // A4 Note
        }

        function playWallHitSound() {
            playTone(220, 'sine', 0.08, 0.15); // A3 Note
        }

        function playScoreSound() {
            if (isAudioMuted || !audioCtx) return;
            playTone(523.25, 'square', 0.1, 0.15); // C5
            setTimeout(() => playTone(659.25, 'square', 0.15, 0.15), 100); // E5
        }

        function playWinSound() {
            if (isAudioMuted || !audioCtx) return;
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C - E - G - C
            notes.forEach((freq, index) => {
                setTimeout(() => playTone(freq, 'square', 0.2, 0.2), index * 120);
            });
        }

        // Retro Synth Background Music Loop
        function startBackgroundMusic() {
            if (musicInterval) return;
            const melody = [261.63, 0, 329.63, 0, 392.00, 329.63, 261.63, 0]; // Simple C Major Synth line
            let noteIndex = 0;

            musicInterval = setInterval(() => {
                if (!isAudioMuted && audioCtx && !isGameOver) {
                    const freq = melody[noteIndex];
                    if (freq > 0) {
                        playTone(freq, 'sine', 0.18, 0.03); // Soft volume for background
                    }
                }
                noteIndex = (noteIndex + 1) % melody.length;
            }, 250);
        }

        // Initialize audio on first user key press or click
        window.addEventListener('keydown', initAudio, { once: true });
        window.addEventListener('click', initAudio, { once: true });

        // Game Constants
        const PADDLE_WIDTH = 12;
        const BALL_RADIUS = 10;
        const FIXED_BALL_SPEED = 7;

        // Dynamic difficulty variables
        let paddleHeight = 110;
        let aiReactionSpeed = 0.05;

        // Game Objects
        const player1 = {
            x: 10,
            y: canvas.height / 2 - 55,
            width: PADDLE_WIDTH,
            height: paddleHeight,
            color: "#FFD700",
            score: 0
        };

        const player2 = {
            x: canvas.width - 10 - PADDLE_WIDTH,
            y: canvas.height / 2 - 55,
            width: PADDLE_WIDTH,
            height: paddleHeight,
            color: "#00FFFF",
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: BALL_RADIUS,
            color: "#FF3399",
            vx: FIXED_BALL_SPEED,
            vy: 2
        };

        const keys = {};

        window.addEventListener("keydown", (e) => { keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key] = false; });

        function updateMaxScore(value) {
            let val = parseInt(value);
            if (isNaN(val) || val < 1) val = 1;
            targetScore = val;
            document.getElementById("maxScoreInput").value = val;
            resetGame();
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById("vsRobotBtn").classList.toggle("active", mode === 'robot');
            document.getElementById("vs2PlayerBtn").classList.toggle("active", mode === '2player');
            
            updateInstructions();
            resetGame();
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.getElementById("easyBtn").classList.toggle("active", diff === 'easy');
            document.getElementById("mediumBtn").classList.toggle("active", diff === 'medium');
            document.getElementById("hardBtn").classList.toggle("active", diff === 'hard');

            if (diff === 'easy') {
                paddleHeight = 110;
                aiReactionSpeed = 0.05;
            } else if (diff === 'medium') {
                paddleHeight = 85;
                aiReactionSpeed = 0.08;
            } else if (diff === 'hard') {
                paddleHeight = 65;
                aiReactionSpeed = 0.13;
            }

            player1.height = paddleHeight;
            player2.height = paddleHeight;
            resetGame();
        }

        function updateInstructions() {
            const instr = document.getElementById("instructionsText");
            if (gameMode === 'robot') {
                instr.innerHTML = "Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Robot AI</b>";
            } else {
                instr.innerHTML = "Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Up Arrow</b> / <b>Down Arrow</b>";
            }
        }

        function resetGame() {
            player1.score = 0;
            player2.score = 0;
            isGameOver = false;
            document.getElementById("gameOverOverlay").style.display = "none";
            resetBall(1);
        }

        function resetBall(direction = 1) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            const angle = (Math.random() * 0.8 - 0.4);
            ball.vx = direction * FIXED_BALL_SPEED * Math.cos(angle);
            ball.vy = FIXED_BALL_SPEED * Math.sin(angle);

            normalizeBallSpeed();
        }

        function normalizeBallSpeed() {
            const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (currentSpeed !== 0) {
                ball.vx = (ball.vx / currentSpeed) * FIXED_BALL_SPEED;
                ball.vy = (ball.vy / currentSpeed) * FIXED_BALL_SPEED;
            }
        }

        function update() {
            if (isGameOver) return;

            // Player 1 Control (W / S)
            if (keys['w'] || keys['W']) player1.y -= 7;
            if (keys['s'] || keys['S']) player1.y += 7;

            // Player 2 Control (Robot or Human)
            if (gameMode === '2player') {
                if (keys['ArrowUp']) player2.y -= 7;
                if (keys['ArrowDown']) player2.y += 7;
            } else {
                const targetY = ball.y - player2.height / 2;
                player2.y += (targetY - player2.y) * aiReactionSpeed; 
            }

            // Keep paddles inside canvas
            player1.y = Math.max(0, Math.min(canvas.height - player1.height, player1.y));
            player2.y = Math.max(0, Math.min(canvas.height - player2.height, player2.y));

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Top and Bottom Wall Collisions
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -1;
                playWallHitSound();
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.vy *= -1;
                playWallHitSound();
            }

            // Paddle Collisions
            let paddle = (ball.x < canvas.width / 2) ? player1 : player2;

            if (checkCollision(ball, paddle)) {
                let collidePoint = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2
